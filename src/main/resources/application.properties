spring.application.name=DesarrolloWeb
server.port=8090

# 1. Configuración de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/desarrollo_web_db
spring.datasource.username=root
# OJO: Cambia "123456" por la contraseña real de tu MySQLx
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de JPA / Hibernate (La magia)
# 'update' le dice a Spring que cree las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
# Esto te mostrará en la consola el código SQL que Spring genera por detrás
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true